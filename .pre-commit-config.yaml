repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests notebooks scripts
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check src tests notebooks scripts
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ban-disallowed-patterns
        name: ban pandas ipynb print
        entry: bash -c '! rg -n "(import pandas|from pandas|\\.ipynb|print\\()" src tests notebooks scripts'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: dead-code
        name: dead code
        entry: uv run vulture src tests notebooks tests/vulture_whitelist.py --ignore-names "_,__generated_with"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-tests
        name: unit tests
        entry: ./scripts/with_cache_env.sh uv run python -m unittest discover -s tests
        language: system
        pass_filenames: false
        stages: [pre-push]
