repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests notebooks
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check src tests notebooks
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ban-disallowed-patterns
        name: ban pandas pymc ipynb print
        entry: bash -c '! rg -n "(import pandas|from pandas|import pymc|from pymc|\\.ipynb|print\\()" src tests notebooks'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: dead-code
        name: dead code
        entry: uv run vulture src tests tests/vulture_whitelist.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: unit-tests
        name: unit tests
        entry: bash -c 'MPLCONFIGDIR=.uv-cache/matplotlib uv run python -m unittest discover -s tests'
        language: system
        pass_filenames: false
        stages: [pre-push]
