name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check src tests scripts

      - name: Unit tests
        env:
          MPLCONFIGDIR: .uv-cache/matplotlib
        run: uv run python -m unittest discover -s tests
